<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Prolific Auto-Reserve</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="../styles/popup.css" rel="stylesheet">
</head>
<body>

<!-- ===== HEADER ===== -->
<header class="header">
    <div class="header-top">
        <img src="../imgs/ayman-logo.png" alt="Logo" class="header-logo">
        <div>
            <h1 class="header-title">Ayman Prolific Notifier</h1>
            <p class="header-subtitle">Studies notified: <span id="counter" class="counter-badge">0</span></p>
        </div>
    </div>
    <nav class="tabs">
        <button class="tab active" data-tab="auto-reserve">Auto-Reserve</button>
        <button class="tab" data-tab="history">History</button>
        <button class="tab" data-tab="settings">Settings</button>
    </nav>
</header>

<!-- ===== TAB: AUTO-RESERVE ===== -->
<section id="tab-auto-reserve" class="tab-content active">

    <!-- Status Card -->
    <div class="card card-status" id="statusCard">
        <div class="status-header">
            <div class="status-dot" id="statusDot"></div>
            <span class="status-text" id="statusText">Connecting...</span>
        </div>
        <div class="status-grid">
            <div class="stat">
                <span class="stat-value" id="studyCount">0</span>
                <span class="stat-label">Studies</span>
            </div>
            <div class="stat">
                <span class="stat-value" id="reservedCount">0</span>
                <span class="stat-label">Reserved</span>
            </div>
            <div class="stat">
                <span class="stat-value" id="uptime">0s</span>
                <span class="stat-label">Uptime</span>
            </div>
        </div>
    </div>

    <!-- Auto-Reserve Toggle -->
    <div class="card">
        <label class="toggle-row">
            <span class="toggle-label">Auto-Reserve Studies</span>
            <div class="toggle-switch">
                <input type="checkbox" id="autoReserve" checked>
                <span class="toggle-slider"></span>
            </div>
        </label>
    </div>

    <!-- Force Check Button -->
    <button class="btn btn-primary btn-block" id="forceCheck">
        Force Check Now
    </button>

</section>

<!-- ===== TAB: SETTINGS ===== -->
<section id="tab-settings" class="tab-content">

    <!-- Startup -->
    <div class="card">
        <h3 class="card-title">General</h3>
        <label class="toggle-row">
            <span class="toggle-label">Open Prolific on startup</span>
            <div class="toggle-switch">
                <input type="checkbox" id="openProlific">
                <span class="toggle-slider"></span>
            </div>
        </label>
    </div>

    <!-- AI Auto-Solver -->
    <div class="card" style="border-left: 3px solid #8b5cf6;">
        <h3 class="card-title" style="color: #6d28d9; display: flex; align-items: center; gap: 6px;">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a2 2 0 0 1 2 2v2a2 2 0 0 1-2 2 2 2 0 0 1-2-2V4a2 2 0 0 1 2-2z"/><path d="M12 18a2 2 0 0 1 2 2v2a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-2a2 2 0 0 1 2-2z"/><path d="M4.93 4.93a2 2 0 0 1 2.83 0l1.41 1.41a2 2 0 0 1-2.83 2.83L4.93 7.76a2 2 0 0 1 0-2.83z"/><path d="M16.24 16.24a2 2 0 0 1 2.83 0l1.41 1.41a2 2 0 0 1-2.83 2.83l-1.41-1.41a2 2 0 0 1 0-2.83z"/><path d="M2 12a2 2 0 0 1 2-2h2a2 2 0 0 1 0 4H4a2 2 0 0 1-2-2z"/><path d="M18 12a2 2 0 0 1 2-2h2a2 2 0 0 1 0 4h-2a2 2 0 0 1-2-2z"/><path d="M4.93 19.07a2 2 0 0 1 0-2.83l1.41-1.41a2 2 0 0 1 2.83 2.83l-1.41 1.41a2 2 0 0 1-2.83 0z"/><path d="M16.24 7.76a2 2 0 0 1 0-2.83l1.41-1.41a2 2 0 0 1 2.83 2.83l-1.41 1.41a2 2 0 0 1-2.83 0z"/></svg>
            AI Auto-Solver Copilot
        </h3>
        
        <label class="toggle-row">
            <span class="toggle-label" style="font-weight: 600;">Enable AI Solver</span>
            <div class="toggle-switch">
                <input type="checkbox" id="aiEnabled">
                <span class="toggle-slider" style="background-color: #ccc;"></span>
            </div>
        </label>
        
        <div id="aiSettingsGroup" style="display: none; margin-top: 10px; padding-top: 10px; border-top: 1px solid #eee;">
            <label class="toggle-row" style="margin-bottom: 10px;">
                <span class="toggle-label" style="font-size: 11px; color: #666;">Shadow Mode (Log only, no clicking)</span>
                <div class="toggle-switch scale-sm">
                    <input type="checkbox" id="aiShadowMode">
                    <span class="toggle-slider"></span>
                </div>
            </label>
            <div class="input-group" style="margin-bottom: 8px;">
                <label for="aiApiKey">API Key</label>
                <input type="password" id="aiApiKey" class="text-input" placeholder="sk-..." style="font-family: monospace;">
            </div>

            <div class="input-group">
                <label for="aiProvider">AI Provider</label>
                <select id="aiProvider" class="select-input">
                    <option value="openai">OpenAI (GPT-4o)</option>
                    <option value="anthropic">Anthropic (Claude 3.5)</option>
                    <option value="google">Google (Gemini 1.5)</option>
                    <option value="openrouter">OpenRouter (All models)</option>
                    <option value="custom">Custom (OpenAI Compatible)</option>
                </select>
            </div>

            <div class="input-group" id="customUrlGroup" style="display: none;">
                <label for="aiBaseUrl">Base URL</label>
                <input type="text" id="aiBaseUrl" class="text-input" placeholder="https://api.openai.com/v1">
            </div>

            <div class="input-group">
                <label for="aiModel">AI Model</label>
                <select id="aiModel" class="select-input">
                    <optgroup label="OpenAI (Direct)" id="opt-openai">
                        <option value="gpt-4o-mini">gpt-4o-mini (Fast & Cheap)</option>
                        <option value="gpt-4o">gpt-4o (Most Intelligent)</option>
                    </optgroup>
                    <optgroup label="Anthropic (Direct)" id="opt-anthropic" style="display: none;">
                        <option value="claude-3-5-sonnet-20240620">Claude 3.5 Sonnet</option>
                        <option value="claude-3-haiku-20240307">Claude 3 Haiku</option>
                    </optgroup>
                    <optgroup label="Google (Direct)" id="opt-google" style="display: none;">
                        <option value="gemini-1.5-flash">Gemini 1.5 Flash</option>
                        <option value="gemini-1.5-pro">Gemini 1.5 Pro</option>
                    </optgroup>
                    <optgroup label="OpenRouter" id="opt-openrouter" style="display: none;">
                        <option value="anthropic/claude-3.5-sonnet">Claude 3.5 Sonnet</option>
                        <option value="google/gemini-flash-1.5">Gemini 1.5 Flash</option>
                        <option value="meta-llama/llama-3.1-70b-instruct">Llama 3.1 70B</option>
                    </optgroup>
                </select>
            </div>
        </div>
    </div>

    <!-- Notifications -->
    <div class="card">
        <h3 class="card-title">Notifications</h3>
        <label class="toggle-row">
            <span class="toggle-label">Play audio for new studies</span>
            <div class="toggle-switch">
                <input type="checkbox" id="autoAudio">
                <span class="toggle-slider"></span>
            </div>
        </label>
        <label class="toggle-row">
            <span class="toggle-label">Show desktop notification</span>
            <div class="toggle-switch">
                <input type="checkbox" id="showNotification">
                <span class="toggle-slider"></span>
            </div>
        </label>
    </div>

    <!-- Audio -->
    <div class="card">
        <h3 class="card-title">Audio</h3>
        <div class="form-row">
            <label for="volume" class="form-label-sm">Volume</label>
            <input type="range" id="volume" value="100" min="0" max="100" class="range-input">
            <span id="volumeValue" class="range-value">100%</span>
        </div>
        <div class="form-row">
            <label for="selectAudio" class="form-label-sm">Alert Sound</label>
            <select id="selectAudio" class="select-input">
                <option value="alert1.mp3">Alert 1</option>
                <option value="alert2.mp3">Alert 2</option>
                <option value="alert3.mp3">Alert 3</option>
            </select>
            <button id="playAudio" class="btn btn-sm btn-secondary">Test</button>
        </div>
    </div>
</section>

<!-- ===== TAB: HISTORY ===== -->
<section id="tab-history" class="tab-content">
    <div class="card" style="padding: 0; max-height: 250px; overflow-y: auto;">
        <ul id="historyList" class="history-list">
            <li class="history-empty">No reserved studies yet.</li>
        </ul>
    </div>
</section>

<script src="../dist/popup.js"></script>
</body>
</html>
